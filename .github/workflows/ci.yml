name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make clean && make
      - name: Test
        run: make test
      - name: Fuzz smoke
        run: make fuzz-smoke
      - name: Lint man page
        run: mandoc -Tlint man/epubscrub.1

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev mandoc
      - name: Build
        run: make clean && make
      - name: Test
        run: make test
      - name: Fuzz smoke
        run: make fuzz-smoke
      - name: Lint man page
        run: mandoc -Tlint man/epubscrub.1
